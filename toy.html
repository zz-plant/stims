<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Legacy Stims launch alias for the MilkDrop visualizer."
    />
    <meta name="robots" content="noindex,follow" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="canonical" href="https://no.toil.fyi/milkdrop/" />
    <title>MilkDrop Visualizer | Stims</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preload" href="/assets/css/base.css" as="style" />
    <link rel="preload" href="/assets/css/index.css" as="style" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/index.css" />
  </head>
  <body data-page="toy">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="content">
      <main class="launch-shell launch-shell--compact" id="main-content">
        <section class="launch-utility-row launch-utility-row--compact" aria-label="Launch helpers">
          <a class="text-link" href="/">Back to Stims</a>
          <a class="text-link" href="/milkdrop/?audio=demo">Start demo audio</a>
          <button type="button" class="text-link launch-utility-row__button" data-open-preflight>
            Run quick check
          </button>
        </section>

        <header class="shell-header shell-header--launch">
          <div data-top-nav-container hidden></div>
          <div class="shell-panels">
            <section class="shell-panel shell-panel--start" aria-label="Audio">
              <div data-audio-controls></div>
            </section>
            <section class="shell-panel shell-panel--tune" aria-label="Tune">
              <div data-settings-panel></div>
            </section>
          </div>
        </header>
      </main>
    </div>
    <script type="module" src="/assets/js/app.ts"></script>
  </body>
</html>

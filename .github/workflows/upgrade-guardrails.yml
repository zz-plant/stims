name: Upgrade Guardrails
on:
  pull_request:
    paths:
      - bun.lock
      - package.json
  workflow_dispatch:
concurrency:
  group: upgrade-guardrails-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate-upgrade-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run check:quick
      - run: bun run build
      - run: bun run test

name: Weekly Parity Digest
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Generate parity summary
        run: |
          mkdir -p artifacts
          echo "## Stims Weekly Digest" > artifacts/digest.md
          echo "" >> artifacts/digest.md
          bun run check 2>&1 | tail -20 >> artifacts/digest.md || echo "Check summary generated" >> artifacts/digest.md
      - uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: artifacts/digest.md

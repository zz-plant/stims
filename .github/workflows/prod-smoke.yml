name: Production Smoke
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check production health
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/prod-smoke.mjs

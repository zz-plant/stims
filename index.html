<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Open the Stims launchpad for demo playback or your own audio input."
    />
    <meta name="application-name" content="Stims" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="canonical" href="https://no.toil.fyi/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>MilkDrop Visualizer | Stims</title>
    <meta property="og:title" content="MilkDrop Visualizer | Stims" />
    <meta
      property="og:description"
      content="Open the Stims launchpad for demo playback or your own audio input."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://no.toil.fyi/" />
    <meta property="og:image" content="https://no.toil.fyi/og/milkdrop.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MilkDrop visualizer preview image" />
    <meta property="og:site_name" content="Stims" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MilkDrop Visualizer | Stims" />
    <meta
      name="twitter:description"
      content="Open the Stims launchpad for demo playback or your own audio input."
    />
    <meta name="twitter:image" content="https://no.toil.fyi/icons/icon-512.png" />
    <meta name="twitter:image:alt" content="MilkDrop visualizer preview image" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="preload" href="assets/css/base.css" as="style" />
    <link rel="preload" href="assets/css/index.css" as="style" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MilkDrop Visualizer",
        "description": "Unified Stims launchpad for demo playback, mic or capture setup, and live tuning.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web",
        "url": "https://no.toil.fyi/",
        "image": "https://no.toil.fyi/og/milkdrop.svg",
        "isAccessibleForFree": true
      }
    </script>
  </head>
  <body data-page="experience">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="content">
      <header class="shell-header shell-header--launch-nav">
        <div data-top-nav-container></div>
      </header>

      <main class="launch-shell" id="main-content">
        <section class="intro launch-intro section-shell">
          <div class="launch-stage__grid">
            <div class="launch-stage__copy">
              <p class="eyebrow">MilkDrop</p>
              <h1>Make sound visible.</h1>
              <p class="section-description">
                Start with demo. Switch to mic, tab capture, or YouTube when you want live input.
              </p>
              <div
                class="hero-cta-row launch-stage__actions"
                role="group"
                aria-label="Launch shortcuts"
              >
                <a class="cta-button primary" href="/?audio=demo">Start demo</a>
                <a class="cta-button ghost" href="#launch-panels">Choose source</a>
              </div>
              <a
                class="text-link"
                href="https://github.com/zz-plant/stims"
                target="_blank"
                rel="noopener noreferrer"
              >
                View source
              </a>
            </div>
          </div>
        </section>

        <section
          class="launch-panels section-shell"
          id="launch-panels"
          aria-labelledby="launch-panels-title"
        >
          <div class="section-heading launch-panels__header">
            <div>
              <p class="eyebrow">Source</p>
              <h2 id="launch-panels-title">Choose a source.</h2>
            </div>
            <p class="section-description">Demo is fastest.</p>
          </div>
          <div class="shell-panels">
            <section
              class="shell-panel shell-panel--start"
              aria-label="Audio"
              data-audio-controls
            ></section>
            <section
              class="shell-panel shell-panel--tune"
              aria-label="Tune"
              data-settings-panel
            ></section>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/js/app.ts"></script>
  </body>
</html>

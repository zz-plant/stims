    <link
      rel="stylesheet"

      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/motion.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('stims:theme');
          if (stored === 'light') document.documentElement.classList.add('light');
          else if (stored === 'dark') document.documentElement.classList.add('dark');
          /* If no stored preference, CSS @media (prefers-color-scheme) handles it */
        } catch (_e) {}
      })();
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Stims — MilkDrop-Inspired Audio Visualizer",
        "description": "MilkDrop-inspired browser music visualizer with instant demo audio, hand-picked favorites, live editing, and optional microphone, tab, or YouTube capture.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web",
        "url": "https://toil.fyi/",
        "image": "https://toil.fyi/og/milkdrop.png",
        "isAccessibleForFree": true
      }
    </script>
  </head>
  <body data-page="experience">
    <div id="app">
      <div
        class="stims-loading"
        id="stims-loading"
        role="status"
        aria-live="polite"
        aria-label="Loading Stims"
      >
        <div>
          <div class="stims-loading__spinner" aria-hidden="true"></div>
          <div class="stims-loading__text">
            Loading MilkDrop visualizer<span class="stims-loading__dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/assets/js/app.ts"></script>
  </body>

    <script>
      (() => {
        try {
          const stored = localStorage.getItem('stims:theme');
          if (stored === 'light') { document.documentElement.classList.add('light'); }
        } catch (_e) {}
      })();
    </script>
    <style>
      .stims-loading { position:fixed; inset:0; z-index:9999; display:grid; place-items:center; background: radial-gradient(circle at 30% 20%, rgba(95, 192, 181, 0.08), transparent 50%), radial-gradient(circle at 70% 80%, rgba(211, 137, 84, 0.06), transparent 50%), #0a0f19; color:#e9fbff; font-family:system-ui,sans-serif; }
      .stims-loading[hidden] { display:none; }
      .stims-loading__spinner { width:52px; height:52px; border-radius:50%; background: conic-gradient(from 0deg, rgba(95, 192, 181, 0.95), rgba(233, 212, 155, 0.85), rgba(211, 137, 84, 0.95), rgba(95, 192, 181, 0.95)); animation:stims-spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; margin:0 auto 16px; position:relative; }
      .stims-loading__spinner::after { content:''; position:absolute; inset:4px; border-radius:50%; background:#0a0f19; }
      @keyframes stims-spin { to { transform:rotate(360deg); } }
      .stims-loading__text { font-size:.9rem; opacity:.7; letter-spacing:0.02em; animation:stims-pulse 2s ease-in-out infinite; }
      .stims-loading__dots { display:inline-flex; gap:3px; margin-left:2px; }
      .stims-loading__dots span { animation:stims-bounce 1.4s ease-in-out infinite both; width:4px; height:4px; background:currentColor; border-radius:50%; display:inline-block; opacity:.7; }
      .stims-loading__dots span:nth-child(1) { animation-delay:-0.32s; }
      .stims-loading__dots span:nth-child(2) { animation-delay:-0.16s; }
      @keyframes stims-pulse { 0%,100% { opacity:.6; } 50% { opacity:.9; } }
      @keyframes stims-bounce { 0%,80%,100% { transform:scale(0.6); opacity:.4; } 40% { transform:scale(1); opacity:.9; } }
    </style>

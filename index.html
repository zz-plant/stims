    <style>
      *,:after,:before{box-sizing:border-box}
      body,html{margin:0;padding:0;min-height:100%}
      body{background:#0a0f19;color:#e9fbff;font-family:system-ui,sans-serif}
      .stims-loading{position:fixed;inset:0;z-index:2147483647;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%,rgba(95,192,181,.08),transparent 50%),radial-gradient(circle at 70% 80%,rgba(211,137,84,.06),transparent 50%),#0a0f19;color:#e9fbff;font-family:system-ui,sans-serif;animation:loading-breathe 4s ease-in-out infinite}
      .stims-loading[hidden]{display:none}
      .stims-loading__spinner{width:56px;height:56px;margin:0 auto 20px;position:relative;border-radius:50%;background:conic-gradient(from 0deg,rgba(95,192,181,.95),rgba(233,212,155,.85),rgba(211,137,84,.95),rgba(119,201,255,.85),rgba(95,192,181,.95));animation:stims-spin 1.2s cubic-bezier(.4,0,.2,1)infinite}
      .stims-loading__spinner:before{content:"";position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 180deg,transparent,rgba(119,201,255,.12),transparent,rgba(95,192,181,.08));animation:stims-spin 2s cubic-bezier(.4,0,.2,1)infinite reverse;opacity:.6}
      .stims-loading__spinner:after{content:"";position:absolute;inset:5px;border-radius:50%;background:#0a0f19}
      .stims-loading__text{font-size:.95rem;letter-spacing:.03em;opacity:.7;background:linear-gradient(135deg,#e9fbff,rgba(119,201,255,.85));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:stims-pulse 2s ease-in-out infinite}
      .stims-loading__dots{display:inline-flex;gap:3px;margin-left:2px}
      .stims-loading__dots span{width:4px;height:4px;display:inline-block;border-radius:50%;background:rgba(119,201,255,.8);opacity:.6;animation:stims-bounce 1.4s ease-in-out infinite both}
      .stims-loading__dots span:first-child{animation-delay:-.32s}
      .stims-loading__dots span:nth-child(2){animation-delay:-.16s}
      .stims-crawl-links{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap}
      @keyframes stims-spin{to{transform:rotate(360deg)}}
      @keyframes stims-pulse{0%,to{opacity:.5}50%{opacity:.85}}
      @keyframes stims-bounce{0%,80%,to{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:.9}}
      @keyframes loading-breathe{0%,to{opacity:.85}50%{opacity:1}}
      @media(prefers-reduced-motion:reduce){.stims-loading,.stims-loading__spinner,.stims-loading__spinner:before,.stims-loading__text,.stims-loading__dots span{animation:none}}
      .stims-loading__fallback{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px 40px;max-width:420px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.35);backdrop-filter:blur(16px);margin:20px}
      .stims-loading__fallback p{margin:0 0 24px;font-size:1rem;line-height:1.6;opacity:0.85}
      .stims-loading__retry{display:inline-block;background:#5fc0b5;color:#0a0f19;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:500;font-size:0.9rem;letter-spacing:0.02em;transition:transform 150ms ease,opacity 150ms ease}
      .stims-loading__retry:hover{transform:scale(1.03);opacity:0.95}
      .stims-loading__retry:active{transform:scale(0.98)}
    </style>

    <!-- Local CSS loads render-blocking: tokens/base/index are the design system
         and above-the-fold layout, so deferring them only buys a flash of
         unstyled content. Web fonts stay deferred (with display=swap) because
         text should paint immediately in a fallback face, not block on the
         network. -->
    <link rel="stylesheet" href="/vendor/normalize.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"

      onload="this.media='all'"

    <script>
      (() => {
        try {
          const stored = localStorage.getItem('stims:theme');
          if (stored === 'light') document.documentElement.classList.add('light');
          else if (stored === 'dark') document.documentElement.classList.add('dark');
          else if (window.matchMedia('(prefers-color-scheme: light)').matches)
            document.documentElement.classList.add('light');
        } catch (_e) {}
      })();
    </script>

      {
        "@context": "https://schema.org",

  <body data-page="experience">
    <div id="app">
      <div
        class="stims-loading"
        id="stims-loading"
        role="status"
        aria-live="polite"
        aria-label="Loading Stims"
      >
        <div>
          <div class="stims-loading__spinner" aria-hidden="true"></div>
          <div class="stims-loading__text">
            Loading MilkDrop visualizer<span class="stims-loading__dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </div>
        </div>
      </div>
    </div>


    <nav class="stims-crawl-links" aria-label="Crawlable site links">
      <a href="/">Visualizer</a>
      <a href="/performance/">Compatibility and performance</a>
    </nav>
    <noscript>
      <div class="stims-loading" role="alert">
        <div class="stims-loading__fallback">
          <p>JavaScript is required to run Stims.</p>
          <p>Please enable JavaScript in your browser and reload the page.</p>
        </div>
      </div>
    </noscript>
    <script>
      (() => {
        const TIMEOUT_MS = 10000;
        const phaseLabels = {
          'app-module': 'Starting app shell',
          'shell-rendered': 'Showing controls',
          'starter-catalog': 'Loading featured presets',
          'full-catalog': 'Preparing full preset library',
          runtime: 'Starting visualizer runtime',
        };
        const text = () => document.querySelector('.stims-loading__text');
        window.addEventListener('stims:load-status', (event) => {
          const phase = event?.detail?.phase;
          const label = phaseLabels[phase];
          const target = text();
          if (!target || !label) return;
          target.textContent = label;
        });
        const timer = setTimeout(() => {
          const loading = document.getElementById('stims-loading');
          if (!loading || document.getElementById('stims-main')) return;
          loading.innerHTML =
            '<div class="stims-loading__fallback">' +
            '<p>Stims is taking longer than expected to load.</p>' +
            '<p><a href="." class="stims-loading__retry">Reload page</a></p>' +
            '</div>';
        }, TIMEOUT_MS);
        window.addEventListener('load', () => clearTimeout(timer), { once: true });
      })();
    </script>

    <script type="module" src="/src/js/app.ts"></script>
  </body>
